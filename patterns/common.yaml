# Shape regexes for --expect. Add custom patterns in ~/.config/secret-capture/patterns.yaml.
# These are intentionally conservative — false-negatives are better than false-positives in validation.

patterns:
  openai:
    regex: '^sk-(proj-)?[A-Za-z0-9_-]{20,}$'
    description: "OpenAI API key (sk- or sk-proj- prefix)"

  anthropic:
    regex: '^sk-ant-(api|admin)[0-9]{2}-[A-Za-z0-9_-]{20,}$'
    description: "Anthropic API key (sk-ant-api01-... / sk-ant-admin01-...)"

  github-pat:
    regex: '^ghp_[A-Za-z0-9]{36}$'
    description: "GitHub classic personal access token"

  github-fine-grained:
    regex: '^github_pat_[A-Za-z0-9_]{22}_[A-Za-z0-9_]{59,}$'
    description: "GitHub fine-grained personal access token"

  github-app:
    regex: '^(ghs_|ghu_|ghr_)[A-Za-z0-9]{36}$'
    description: "GitHub app token (server / user-to-server / refresh)"

  aws-access-key:
    regex: '^AKIA[0-9A-Z]{16}$'
    description: "AWS IAM access key id"

  aws-secret-key:
    regex: '^[A-Za-z0-9/+=]{40}$'
    description: "AWS IAM secret access key (40-char base64-ish)"

  stripe-live:
    regex: '^(sk|pk|rk)_live_[A-Za-z0-9]{24,}$'
    description: "Stripe live key"

  stripe-test:
    regex: '^(sk|pk|rk)_test_[A-Za-z0-9]{24,}$'
    description: "Stripe test key"

  cloudflare-token:
    regex: '^[A-Za-z0-9_-]{40}$'
    description: "Cloudflare API token (v2, 40-char opaque)"

  cloudflare-global-key:
    regex: '^[a-f0-9]{37}$'
    description: "Cloudflare global API key (legacy, 37-char hex)"

  slack-bot:
    regex: '^xoxb-[0-9]{11,}-[0-9]{11,}-[A-Za-z0-9]{24,}$'
    description: "Slack bot user OAuth token"

  slack-user:
    regex: '^xoxp-[0-9]{11,}-[0-9]{11,}-[0-9]{11,}-[A-Za-z0-9]{32,}$'
    description: "Slack user OAuth token"

  slack-workflow:
    regex: '^xoxr-[A-Za-z0-9]{20,}$'
    description: "Slack workflow trigger token"

  jwt:
    regex: '^eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+$'
    description: "JSON Web Token (three dot-separated base64url segments)"

  uuid:
    regex: '^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$'
    description: "UUID v1–v5 (lowercase hex)"
